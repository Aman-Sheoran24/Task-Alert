<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Matrix</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      padding: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .header { text-align: center; margin-bottom: 10px; padding-top: 4px; }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .header p { font-size: 11px; color: #888; margin-top: 2px; }

    /* Google Calendar connection bar */
    .gcal-bar {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      background: #fff; border: 1px solid #e3e6ea; border-radius: 8px;
      padding: 8px 10px; margin-bottom: 10px; font-size: 11px;
    }
    .gcal-status { color: #666; flex: 1; min-width: 0; line-height: 1.3; }
    .gcal-status.on { color: #1a7f37; font-weight: 600; }
    .gcal-status.err { color: #c0392b; }
    .gcal-bar button {
      border: none; background: #4285F4; color: #fff; padding: 7px 11px;
      border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0;
    }
    .gcal-bar button:active { opacity: 0.8; }
    .gcal-bar button:disabled { background: #bbb; cursor: default; }

    .input-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .input-row input {
      flex: 1; min-width: 0;
      padding: 11px 12px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; background: white; outline: none;
    }
    .input-row input:focus { border-color: #aaa; }
    .icon-btn {
      padding: 11px 13px; border: none; border-radius: 8px;
      font-size: 16px; cursor: pointer; flex-shrink: 0;
    }
    .icon-btn:active { opacity: 0.7; }
    .btn-add   { background: #2ecc71; color: white; }
    .btn-voice { background: #2c3e50; color: white; }
    .btn-voice.on { background: #e74c3c; }

    /* Matrix */
    .matrix { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .quadrant {
      border-radius: 10px; padding: 10px;
      display: flex; flex-direction: column;
      border-left: 4px solid; min-height: 170px;
      transition: transform 0.12s, opacity 0.12s;
    }
    .quadrant.drag-over {
      transform: scale(0.97); opacity: 0.75;
      outline: 2px dashed #aaa; outline-offset: -2px;
    }

    .q-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .q-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .q-count { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 9px; background: rgba(0,0,0,0.1); }

    .q1 { border-color: #e74c3c; background: #fdedec; }
    .q1 .q-label { color: #922b21; }
    .q2 { border-color: #e67e22; background: #fef5ec; }
    .q2 .q-label { color: #935116; }
    .q3 { border-color: #27ae60; background: #eafaf1; }
    .q3 .q-label { color: #1a5276; }
    .q4 { border-color: #95a5a6; background: #f2f3f4; }
    .q4 .q-label { color: #616a6b; }

    /* Task list */
    .task-list { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .empty-msg { color: #ccc; font-size: 12px; text-align: center; padding: 16px 0; }

    /* Task card */
    .task {
      position: relative;
      background: white; border-radius: 6px; padding: 8px;
      font-size: 13px; border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      user-select: none; touch-action: manipulation;
    }
    .task.dragging { opacity: 0.35; }
    .task.done .task-text { text-decoration: line-through; color: #aaa; }

    /* Braille-style drag handle */
    .task-handle {
      color: #ccc; font-size: 12px; cursor: grab;
      display: block; margin-bottom: 3px; letter-spacing: 1px;
    }

    .task-text { line-height: 1.4; margin-bottom: 5px; word-break: break-word; }

    .task-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 6px; border-radius: 4px; margin-bottom: 5px; margin-right: 4px;
    }
    .overdue { background: #e74c3c; color: white; }
    .soon    { background: #f39c12; color: white; }
    .later   { background: #3498db; color: white; }
    .alarm   { background: #6c5ce7; color: white; }

    .task-actions { display: flex; gap: 4px; }
    .task-btn {
      flex: 1; padding: 4px; font-size: 12px;
      border: 1px solid #eee; border-radius: 4px;
      background: #fafafa; cursor: pointer;
    }
    .task-btn:hover, .task-btn:active { background: #efefef; }
    .task-btn.green { color: #27ae60; border-color: #a9dfbf; }
    .task-btn.red   { color: #e74c3c; }
    .task-btn.dots  { flex: 0 0 36px; font-weight: 700; letter-spacing: 1px; }

    /* Per-task notes / comments (a task can have several) */
    .task-notes { display: flex; flex-direction: column; gap: 4px; margin-bottom: 5px; }
    .task-note {
      font-size: 12px; color: #555; background: #f6f7f9;
      border: 1px solid #ececf0; border-radius: 5px;
      padding: 5px 8px;
      display: flex; align-items: flex-start; gap: 6px;
    }
    .task-note .note-text { flex: 1; white-space: pre-wrap; word-break: break-word; }
    .task-note .note-del {
      border: none; background: none; color: #bbb; font-size: 12px;
      cursor: pointer; line-height: 1; padding: 1px 2px; flex-shrink: 0;
    }
    .task-note .note-del:hover, .task-note .note-del:active { color: #e74c3c; }

    /* 3-dot task menu (pops up above the action row) */
    .task-menu {
      position: absolute; right: 6px; bottom: 40px; z-index: 60;
      min-width: 150px; background: #fff;
      border: 1px solid #e3e6ea; border-radius: 9px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
      overflow: hidden; display: none;
    }
    .task-menu.open { display: block; }
    .task-menu button {
      display: block; width: 100%; text-align: left;
      border: none; background: #fff; color: #333;
      padding: 10px 12px; font-size: 13px; cursor: pointer;
    }
    .task-menu button:hover, .task-menu button:active { background: #f2f3f5; }

    /* Edit mode */
    .task-edit {
      width: 100%; padding: 5px; border: 1.5px solid #3498db; border-radius: 4px;
      font-size: 13px; font-family: inherit; resize: none; outline: none;
      margin-bottom: 5px; line-height: 1.4;
    }

    /* Touch drag ghost */
    .drag-ghost {
      position: fixed; pointer-events: none; z-index: 9999;
      background: white; padding: 8px 10px; border-radius: 8px;
      font-size: 13px; line-height: 1.4; max-width: 150px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transform: translateX(-50%) rotate(2deg);
      opacity: 0.92; word-break: break-word;
    }

    /* Status */
    .status { font-size: 11px; color: #aaa; text-align: center; margin-top: 8px; min-height: 18px; }

    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 500;
      align-items: center; justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-box { background: white; border-radius: 14px; padding: 20px; width: 88%; max-width: 340px; }
    .modal-box h3 { font-size: 15px; margin-bottom: 14px; }
    .modal-box label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
    .modal-box input {
      width: 100%; padding: 10px; margin-bottom: 14px;
      border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none;
    }
    .modal-box input:focus { border-color: #aaa; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns button {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .m-set  { background: #2ecc71; color: white; }
    .m-skip { background: #ecf0f1; color: #555; font-weight: 400; }

    /* ── Notes & Ideas (free-form, not tasks) ─────────────────────── */
    .notes-section {
      background: #fff; border: 1px solid #e3e6ea; border-radius: 10px;
      padding: 10px; margin-top: 12px;
    }
    .notes-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #555; }
    .notes-title .log-count { background: rgba(0,0,0,0.1); border-radius: 9px; padding: 1px 6px; margin-left: 4px; font-size: 10px; }
    .idea-input-row { display: flex; gap: 6px; margin: 8px 0; }
    .idea-input-row textarea {
      flex: 1; min-width: 0; padding: 8px 9px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 13px; font-family: inherit; resize: vertical; outline: none;
    }
    .idea-input-row textarea:focus { border-color: #aaa; }
    .idea-add { border: none; border-radius: 8px; padding: 0 14px; font-size: 13px; font-weight: 600; cursor: pointer; background: #34495e; color: #fff; }
    .idea-add:active { opacity: 0.8; }
    .idea-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
    .idea-item { border: 1px solid #eee; border-radius: 8px; padding: 7px 9px; background: #fafbfc; }
    .idea-text { font-size: 13px; color: #444; white-space: pre-wrap; word-break: break-word; margin-bottom: 4px; }
    .idea-bottom { display: flex; align-items: center; justify-content: space-between; }
    .idea-when { font-size: 10px; color: #aaa; }
    .idea-del { border: none; background: none; color: #bbb; font-size: 12px; cursor: pointer; padding: 1px 2px; }
    .idea-del:hover, .idea-del:active { color: #e74c3c; }

    /* ── Completed-task log ───────────────────────────────────────── */
    .log-section {
      background: #fff; border: 1px solid #e3e6ea; border-radius: 10px;
      padding: 10px; margin-top: 12px;
    }
    .log-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .log-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #555; cursor: pointer; }
    .log-title .log-count { background: rgba(0,0,0,0.1); border-radius: 9px; padding: 1px 6px; margin-left: 4px; font-size: 10px; }
    .log-head-actions { display: flex; gap: 6px; }
    .log-toggle, .log-clear { border: none; background: #f2f3f4; color: #888; font-size: 11px; padding: 4px 8px; border-radius: 6px; cursor: pointer; }
    .log-toggle:active, .log-clear:active { opacity: 0.7; }
    .log-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
    .log-list.collapsed { display: none; }
    .log-item { border: 1px solid #eee; border-radius: 8px; padding: 7px 9px; background: #fafbfc; }
    .log-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .log-when { font-size: 10px; color: #aaa; margin-left: auto; }
    .log-text { font-size: 13px; color: #444; word-break: break-word; }
    .log-detail { font-size: 11px; color: #777; margin-top: 3px; line-height: 1.35; }
    .log-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; color: #fff; }
    .log-badge.done   { background: #16a085; }
    .log-badge.ontime { background: #27ae60; }
    .log-badge.late   { background: #e74c3c; }
    .log-reopen { background: none; border: none; color: #3498db; font-size: 11px; cursor: pointer; padding: 2px 0; margin-top: 4px; }

    /* ── Fast-reading launcher ────────────────────────────────────── */
    .read-launch {
      width: 100%; margin-top: 12px; padding: 11px;
      border: none; border-radius: 10px; background: #34495e; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .read-launch:active { opacity: 0.85; }

    /* ── Fast-reading (RSVP) modal ────────────────────────────────── */
    .read-box { max-width: 460px; width: 92%; max-height: 92vh; overflow-y: auto; }
    .read-box h3 { display: flex; align-items: center; justify-content: space-between; }
    .read-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; line-height: 1; }
    .read-lib-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .read-lib-row select { flex: 1; min-width: 0; padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
    .read-lib-row button { border: none; border-radius: 8px; padding: 8px 10px; font-size: 13px; cursor: pointer; background: #ecf0f1; color: #444; }
    .read-title-input { width: 100%; padding: 9px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; margin-bottom: 6px; }
    .read-text { width: 100%; min-height: 90px; padding: 9px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: inherit; line-height: 1.4; resize: vertical; margin-bottom: 6px; }
    .read-save-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .read-save-row button { flex: 1; border: none; border-radius: 8px; padding: 9px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .read-save  { background: #2ecc71; color: #fff; }
    .read-del   { background: #f8d7da; color: #c0392b; }

    /* The fixed-point word display */
    .rsvp-stage {
      background: #1c2530; border-radius: 12px; padding: 26px 10px; margin-bottom: 6px;
      position: relative; overflow: hidden;
    }
    .rsvp-guide { position: absolute; left: 50%; width: 1px; background: rgba(255,255,255,0.18); }
    .rsvp-guide.top { top: 6px; height: 16px; }
    .rsvp-guide.bot { bottom: 6px; height: 16px; }
    .rsvp-word {
      display: flex; align-items: baseline; justify-content: center;
      font-size: 30px; font-weight: 600; color: #f5f6fa;
      font-family: 'Segoe UI', system-ui, sans-serif; letter-spacing: 0.5px;
      min-height: 40px;
    }
    .rsvp-word .l { flex: 1; text-align: right; white-space: pre; }
    .rsvp-word .r { flex: 1; text-align: left;  white-space: pre; }
    .rsvp-word .p { color: #ff5252; padding: 0 1px; }
    .rsvp-idle { color: #7f8c9b; font-size: 15px; font-weight: 400; }

    .rsvp-progress { height: 5px; background: #e6e9ec; border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
    .rsvp-bar { height: 100%; width: 0%; background: #3498db; transition: width 0.08s linear; }
    .rsvp-meta { display: flex; justify-content: space-between; font-size: 11px; color: #999; margin-bottom: 10px; }

    .rsvp-seek { margin-bottom: 8px; }
    .rsvp-seek label { font-size: 11px; color: #999; display: block; margin-bottom: 3px; }
    .rsvp-seek input[type=range] { width: 100%; }

    .rsvp-speed { margin-bottom: 8px; }
    .rsvp-speed label { font-size: 12px; color: #666; display: flex; justify-content: space-between; margin-bottom: 4px; }
    .rsvp-speed input[type=range] { width: 100%; }
    .rsvp-presets { display: flex; gap: 5px; margin-top: 6px; }
    .rsvp-presets button { flex: 1; border: 1px solid #ddd; background: #fff; border-radius: 6px; padding: 5px; font-size: 11px; cursor: pointer; color: #555; }
    .rsvp-presets button.active { background: #3498db; color: #fff; border-color: #3498db; }

    .rsvp-controls { display: flex; gap: 6px; }
    .rsvp-controls button { flex: 1; border: none; border-radius: 8px; padding: 11px; font-size: 16px; cursor: pointer; background: #ecf0f1; color: #333; }
    .rsvp-controls button.play { background: #2ecc71; color: #fff; flex: 2; }
    .rsvp-controls button:active { opacity: 0.8; }

    @media (max-width: 440px) {
      .matrix { grid-template-columns: 1fr; }
      .quadrant { min-height: 120px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Task Matrix</h1>
  <p>Urgent–Important Prioritization</p>
</div>

<!-- Google Calendar connection -->
<div class="gcal-bar">
  <span class="gcal-status" id="gcalStatus">Calendar alerts: off</span>
  <button id="gcalBtn" disabled>Connect Google Calendar</button>
</div>

<div class="input-row">
  <input id="taskInput" type="text" placeholder="Add a task…" autocomplete="off" autocorrect="off">
  <button class="icon-btn btn-add" id="addBtn" title="Add task">＋</button>
  <button class="icon-btn btn-voice" id="voiceBtn" title="Voice input">🎤</button>
</div>

<div class="matrix">
  <div class="quadrant q1" id="qc1">
    <div class="q-header">
      <span class="q-label">Urgent + Important</span>
      <span class="q-count" id="cnt1">0</span>
    </div>
    <div class="task-list" id="q1" data-quad="1"></div>
  </div>
  <div class="quadrant q2" id="qc2">
    <div class="q-header">
      <span class="q-label">Urgent, not important</span>
      <span class="q-count" id="cnt2">0</span>
    </div>
    <div class="task-list" id="q2" data-quad="2"></div>
  </div>
  <div class="quadrant q3" id="qc3">
    <div class="q-header">
      <span class="q-label">Important, not urgent</span>
      <span class="q-count" id="cnt3">0</span>
    </div>
    <div class="task-list" id="q3" data-quad="3"></div>
  </div>
  <div class="quadrant q4" id="qc4">
    <div class="q-header">
      <span class="q-label">Neither</span>
      <span class="q-count" id="cnt4">0</span>
    </div>
    <div class="task-list" id="q4" data-quad="4"></div>
  </div>
</div>

<!-- Notes & Ideas: free-form thoughts related to tasks that aren't tasks themselves -->
<div class="notes-section" id="notesSection">
  <div class="log-head">
    <span class="notes-title">📝 Notes &amp; Ideas<span class="log-count" id="ideaCount">0</span></span>
  </div>
  <div class="idea-input-row">
    <textarea id="ideaInput" rows="2" placeholder="A point or idea related to your tasks — not a task itself…"></textarea>
    <button class="idea-add" id="ideaAdd">Add</button>
  </div>
  <div class="idea-list" id="ideaList"></div>
</div>

<div class="status" id="status"></div>

<!-- Completed-task activity log -->
<div class="log-section" id="logSection">
  <div class="log-head">
    <span class="log-title" id="logToggle">Activity log<span class="log-count" id="logCount">0</span></span>
    <div class="log-head-actions">
      <button class="log-toggle" id="logToggleBtn">Show</button>
      <button class="log-clear" id="logClear">Clear completed</button>
    </div>
  </div>
  <div class="log-list collapsed" id="logList"></div>
</div>

<!-- Fast-reading launcher -->
<button class="read-launch" id="readLaunch">📖 Fast Reading practice</button>

<div class="modal" id="dlModal">
  <div class="modal-box">
    <h3>Set a deadline? (optional)</h3>
    <label>Date & time</label>
    <input type="datetime-local" id="dlInput">
    <div class="modal-btns">
      <button class="m-set"  id="dlConfirm">Set deadline</button>
      <button class="m-skip" id="dlSkip">Skip</button>
    </div>
  </div>
</div>

<!-- Note / comment editor -->
<div class="modal" id="noteModal">
  <div class="modal-box">
    <h3>Add a comment</h3>
    <label>This is added as a new comment — earlier comments on this task are kept</label>
    <textarea id="noteInput" rows="4"
      style="width:100%;padding:10px;margin-bottom:14px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;line-height:1.4;outline:none;resize:vertical;"></textarea>
    <div class="modal-btns">
      <button class="m-set"  id="noteSave">Add comment</button>
      <button class="m-skip" id="noteCancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Fast Reading (RSVP) modal -->
<div class="modal" id="readModal">
  <div class="modal-box read-box">
    <h3>Fast Reading <button class="read-close" id="readClose">&times;</button></h3>

    <!-- Library (the "custom database" of saved passages) -->
    <label>Your library</label>
    <div class="read-lib-row">
      <select id="readLib"></select>
      <button id="readNew" title="New passage">＋ New</button>
    </div>

    <input class="read-title-input" id="readTitle" type="text" placeholder="Passage title (e.g. Article 1)" autocomplete="off">
    <textarea class="read-text" id="readContent" placeholder="Paste or type the text you want to speed-read here…"></textarea>
    <div class="read-save-row">
      <button class="read-save" id="readSave">Save passage</button>
      <button class="read-del"  id="readDelete">Delete</button>
    </div>

    <!-- The fixed-point reader -->
    <div class="rsvp-stage">
      <span class="rsvp-guide top"></span>
      <span class="rsvp-guide bot"></span>
      <div class="rsvp-word" id="rsvpWord"><span class="rsvp-idle">Press play to begin</span></div>
    </div>
    <div class="rsvp-progress"><div class="rsvp-bar" id="rsvpBar"></div></div>
    <div class="rsvp-meta"><span id="rsvpPos">0 / 0 words</span><span id="rsvpEta"></span></div>

    <div class="rsvp-seek">
      <label>Jump to any point — your place is remembered automatically</label>
      <input type="range" id="rsvpSeek" min="0" max="0" value="0" step="1">
    </div>

    <div class="rsvp-speed">
      <label>Speed <span id="rsvpWpmLabel">300 WPM</span></label>
      <input type="range" id="rsvpWpm" min="100" max="800" step="25" value="300">
      <div class="rsvp-presets" id="rsvpPresets">
        <button data-wpm="200">200</button>
        <button data-wpm="300">300</button>
        <button data-wpm="400">400</button>
        <button data-wpm="500">500</button>
        <button data-wpm="600">600</button>
      </div>
    </div>

    <div class="rsvp-controls">
      <button id="rsvpPrev" title="Back 10 words">⏮</button>
      <button class="play" id="rsvpPlay">▶ Play</button>
      <button id="rsvpNext" title="Forward 10 words">⏭</button>
      <button id="rsvpReset" title="Restart">⟳</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ════════════════════════════════════════════════════════════════════════════
   CONFIG — edit these three lines, then deploy.
   ──────────────────────────────────────────────────────────────────────────── */

// Paste the OAuth Client ID you create in Google Cloud (see README). NOT a secret.
const GOOGLE_CLIENT_ID = '574004484248-974don3f0deh34qfufuaupt77dg1lq06.apps.googleusercontent.com';

// Your timezone, and the hour for the daily review (24h clock, local time).
const CAL_TIMEZONE = 'Asia/Kolkata';
const DAILY_HOUR   = 10;   // 10 = 10:00 AM

// Deadline reminders, in minutes before the deadline.
const REMIND_5H = 300;     // 5 hours
const REMIND_2H = 120;     // 2 hours

/* ════════════════════════════════════════════════════════════════════════════ */

// ─── Data ────────────────────────────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('tm_tasks') || '[]');

// Migrate the old single `note` string (one comment per task) into a `notes`
// array (many comments per task). Runs once per task, the first time it's seen
// after this update; harmless to re-run since it only fires when `.notes` is absent.
tasks.forEach(t => {
  if (t.notes == null) {
    t.notes = t.note ? [{ id: t.id + 1, text: t.note, createdAt: t.updatedAt || t.id }] : [];
    delete t.note;
  }
});

// ─── UI refs ─────────────────────────────────────────────────────────────────
const taskInput  = document.getElementById('taskInput');
const addBtn     = document.getElementById('addBtn');
const voiceBtn   = document.getElementById('voiceBtn');
const dlModal    = document.getElementById('dlModal');
const dlInput    = document.getElementById('dlInput');
const noteModal  = document.getElementById('noteModal');
const noteInput  = document.getElementById('noteInput');
const statusEl   = document.getElementById('status');
const gcalBtn    = document.getElementById('gcalBtn');
const gcalStatus = document.getElementById('gcalStatus');

// ─── App state ───────────────────────────────────────────────────────────────
let editingId   = null;
let pendingText = '';
let dlMode      = 'add';   // 'add' (new task) | 'edit' (change an existing deadline)
let dlEditId    = null;    // task id when dlMode === 'edit'
let noteTaskId  = null;    // task id whose note is being edited

// ─── Drag state ──────────────────────────────────────────────────────────────
let dragId       = null;
let ghost        = null;
let dropQuad     = null;
let touchTimer   = null;
let touchOriginX = 0;
let touchOriginY = 0;

// ─── Google Calendar state ─────────────────────────────────────────────────────
let tokenClient   = null;
let accessToken   = null;
let gcalConnected = false;
let syncTimer     = null;

// "Remember me" state. Once you've connected on this device, we stash a flag and
// then try to get fresh tokens SILENTLY (no popup, no consent screen) on every
// later visit. Google only re-prompts if your Google session itself has lapsed.
const GCAL_REMEMBER_KEY     = 'tm_gcal_remember';
let   silentReauth          = false;   // a silent (prompt:'') request is in flight
let   suppressSyncOnToken   = false;   // token arrived from a background refresh only
let   refreshTimer          = null;    // periodic silent-refresh interval

// ─── Google Drive sync state ───────────────────────────────────────────────────
const DRIVE_FILE_NAME = 'task-matrix.json';
let driveFileId       = localStorage.getItem('tm_drive_file') || null;  // id of the appData file
let driveModifiedSeen = localStorage.getItem('tm_drive_mtime') || null; // last modifiedTime we merged

// Called by the Google Identity Services script once it has loaded.
function initGis() {
  if (GOOGLE_CLIENT_ID.indexOf('PASTE_YOUR_CLIENT_ID') === 0) {
    setGcalStatus('Add your Google Client ID in index.html to enable alerts', 'err');
    return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    // calendar.events = create/update reminder events; drive.appdata = a hidden,
    // app-private file in the user's Drive that holds the task list (cross-device sync).
    scope: 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/drive.appdata',
    callback: (resp) => {
      if (resp && resp.access_token) {
        accessToken   = resp.access_token;
        gcalConnected = true;
        silentReauth  = false;
        // Remember this device so future visits reconnect silently.
        localStorage.setItem(GCAL_REMEMBER_KEY, '1');
        updateGcalUI();
        startTokenRefresh();
        const wasBackground = suppressSyncOnToken;
        suppressSyncOnToken = false;
        if (!wasBackground) onConnected();   // full pull + reconcile on real (re)connect
      } else {
        setGcalStatus('Could not connect to Google', 'err');
      }
    },
    // Fires when a token request fails — most importantly when a SILENT
    // (prompt:'') request can't complete without showing UI. We swallow that
    // quietly and just leave the Connect button for a one-tap manual sign-in.
    error_callback: (err) => {
      suppressSyncOnToken = false;
      if (silentReauth) {
        silentReauth = false;
        updateGcalUI();   // back to "Connect Google Calendar", no scary error
      } else {
        setGcalStatus('Sign-in was cancelled — tap Connect to retry', 'err');
      }
    },
  });
  gcalBtn.disabled = false;
  updateGcalUI();

  // Remembered device? Try to reconnect SILENTLY so the user doesn't have to tap
  // Connect every visit. If their Google session is gone, error_callback fires
  // and we fall back to the normal Connect button.
  if (localStorage.getItem(GCAL_REMEMBER_KEY) === '1') {
    silentReauth = true;
    setGcalStatus('Reconnecting to Google…');
    try { tokenClient.requestAccessToken({ prompt: '' }); }
    catch (_) { silentReauth = false; updateGcalUI(); }
  }
}

// Google access tokens last ~1 hour. While connected, quietly refresh in the
// background so a long session never interrupts you to sign in again.
function startTokenRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    if (gcalConnected && tokenClient) {
      suppressSyncOnToken = true;   // a refresh shouldn't trigger a full re-sync
      try { tokenClient.requestAccessToken({ prompt: '' }); }
      catch (_) { suppressSyncOnToken = false; }
    }
  }, 50 * 60 * 1000);  // every 50 minutes
}

// Try to silently recover a token after one expired mid-use, without bugging
// the user. If it works, the next scheduled sync just succeeds.
function attemptSilentReconnect() {
  if (!tokenClient || localStorage.getItem(GCAL_REMEMBER_KEY) !== '1') return;
  silentReauth = true;
  try { tokenClient.requestAccessToken({ prompt: '' }); }
  catch (_) { silentReauth = false; }
}

gcalBtn.addEventListener('click', () => {
  if (!tokenClient) return;
  silentReauth = false;
  // 'consent' the first time so the permission screen shows; '' = silent reconnect.
  tokenClient.requestAccessToken({ prompt: gcalConnected ? '' : 'consent' });
});

function updateGcalUI() {
  if (gcalConnected) {
    gcalBtn.textContent = 'Re-sync';
    setGcalStatus('Calendar alerts: on', 'on');
  } else {
    gcalBtn.textContent = 'Connect Google Calendar';
    setGcalStatus('Calendar alerts: off');
  }
}

function setGcalStatus(text, cls) {
  gcalStatus.textContent = text;
  gcalStatus.className = 'gcal-status' + (cls ? ' ' + cls : '');
}

// Low-level Google Calendar REST call.
async function gcal(method, path, body) {
  const r = await fetch('https://www.googleapis.com/calendar/v3' + path, {
    method,
    headers: {
      Authorization: 'Bearer ' + accessToken,
      'Content-Type': 'application/json',
    },
    body: body ? JSON.stringify(body) : undefined,
  });

  if (r.status === 401) {            // token expired
    gcalConnected = false;
    accessToken = null;
    updateGcalUI();
    setGcalStatus('Refreshing Google session…');
    attemptSilentReconnect();        // recover without bugging the user, if possible
    throw new Error('expired');
  }
  if (r.status === 204) return null; // e.g. successful DELETE
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error((data.error && data.error.message) || ('HTTP ' + r.status));
  return data;
}

// Low-level Google Drive REST call. `url` is a full Drive API URL. Returns parsed
// JSON, or the raw text when raw=true (used to download the task-list file).
// Same Bearer auth + 401→expired handling as gcal().
async function drive(method, url, body, raw) {
  const headers = { Authorization: 'Bearer ' + accessToken };
  if (body !== undefined) headers['Content-Type'] = 'application/json';
  const r = await fetch(url, {
    method,
    headers,
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });

  if (r.status === 401) {            // token expired
    gcalConnected = false;
    accessToken = null;
    updateGcalUI();
    setGcalStatus('Refreshing Google session…');
    attemptSilentReconnect();
    throw new Error('expired');
  }
  if (r.status === 204) return null;
  const text = await r.text();
  if (!r.ok) {
    let msg = 'HTTP ' + r.status;
    try { msg = JSON.parse(text).error.message || msg; } catch (_) {}
    throw new Error(msg);
  }
  if (raw) return text;
  return text ? JSON.parse(text) : null;
}

// Find (or lazily create) the hidden appData file that stores the task list.
async function ensureDriveFile() {
  if (driveFileId) return driveFileId;
  const q = encodeURIComponent("name='" + DRIVE_FILE_NAME + "'");
  const list = await drive('GET',
    'https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,modifiedTime)&q=' + q);
  if (list && list.files && list.files.length) {
    driveFileId = list.files[0].id;
  } else {
    const meta = await drive('POST', 'https://www.googleapis.com/drive/v3/files',
      { name: DRIVE_FILE_NAME, parents: ['appDataFolder'] });
    driveFileId = meta.id;
  }
  localStorage.setItem('tm_drive_file', driveFileId);
  return driveFileId;
}

// Union two task lists by id; for the same id keep the newer (larger updatedAt)
// record. eventId rides along, so a second device reuses the calendar event
// instead of duplicating it. Tombstones (deleted:true) are kept so deletes
// propagate; they're filtered out at render time.
function mergeTasks(a, b) {
  const byId = new Map();
  for (const t of a.concat(b)) {
    if (!t || t.id == null) continue;
    const prev = byId.get(t.id);
    if (!prev || (t.updatedAt || 0) >= (prev.updatedAt || 0)) byId.set(t.id, t);
  }
  return Array.from(byId.values());
}

// Pull the task list from Drive and merge it into local state. Cheap-checks
// modifiedTime first so a no-op focus doesn't re-download or re-render.
async function loadFromDrive() {
  if (!gcalConnected || !accessToken) return;
  const id = await ensureDriveFile();

  const meta = await drive('GET',
    'https://www.googleapis.com/drive/v3/files/' + id + '?fields=modifiedTime');
  const mtime = meta && meta.modifiedTime;
  if (mtime && mtime === driveModifiedSeen) return;  // already merged this version

  const text = await drive('GET',
    'https://www.googleapis.com/drive/v3/files/' + id + '?alt=media', undefined, true);
  let remote = [];
  if (text) { try { remote = JSON.parse(text) || []; } catch (_) { remote = []; } }
  if (Array.isArray(remote) && remote.length) {
    tasks = mergeTasks(tasks, remote);
    localStorage.setItem('tm_tasks', JSON.stringify(tasks));
    render();
  }
  if (mtime) { driveModifiedSeen = mtime; localStorage.setItem('tm_drive_mtime', mtime); }
}

// Write the current task list to Drive and remember the resulting modifiedTime
// (so the next focus-pull doesn't re-download our own write).
async function saveToDrive() {
  if (!gcalConnected || !accessToken) return;
  const id = await ensureDriveFile();
  const meta = await drive('PATCH',
    'https://www.googleapis.com/upload/drive/v3/files/' + id + '?uploadType=media&fields=modifiedTime',
    tasks);
  if (meta && meta.modifiedTime) {
    driveModifiedSeen = meta.modifiedTime;
    localStorage.setItem('tm_drive_mtime', meta.modifiedTime);
  }
}

// Event body for a single task's deadline (absolute UTC instant + 5h/2h reminders).
function taskEventBody(t) {
  const startMs = t.deadline;
  return {
    summary: '⏰ ' + t.text,
    description: 'Deadline reminder from Task Matrix.',
    start: { dateTime: new Date(startMs).toISOString() },
    end:   { dateTime: new Date(startMs + 30 * 60000).toISOString() },
    reminders: {
      useDefault: false,
      overrides: [
        { method: 'popup', minutes: REMIND_5H },
        { method: 'popup', minutes: REMIND_2H },
      ],
    },
  };
}

// Single-day review event for TODAY at DAILY_HOUR, listing current Q1 tasks.
// Deliberately NOT a recurring event: an infinite RRULE:FREQ=DAILY event shows up
// on every future day forever, even days with zero Urgent+Important tasks, which
// is what was flooding the calendar. Instead we create at most one event, dated
// today, and only when there's actually something to review — so an empty board
// means no event at all, and a busy board only ever shows on the day it applies to.
function dailyEventBody(q1, dateStr) {
  const hh = pad(DAILY_HOUR);
  return {
    summary: '🔴 Urgent + Important — daily review',
    description: 'Urgent + Important right now:\n' + q1.map((t, i) => `${i + 1}. ${t.text}`).join('\n'),
    start: { dateTime: `${dateStr}T${hh}:00:00`, timeZone: CAL_TIMEZONE },
    end:   { dateTime: `${dateStr}T${hh}:15:00`, timeZone: CAL_TIMEZONE },
    reminders: { useDefault: false, overrides: [{ method: 'popup', minutes: 0 }] },
  };
}

function pad(n) { return String(n).padStart(2, '0'); }
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

// Reconcile every task and the daily event with Google Calendar.
async function syncCalendar() {
  if (!gcalConnected || !accessToken) return;
  setGcalStatus('Syncing…', 'on');

  try {
    for (const t of tasks) {
      const wantEvent = !t.deleted && !t.done && !!t.deadline;

      if (wantEvent && !t.eventId) {
        const ev = await gcal('POST', '/calendars/primary/events', taskEventBody(t));
        t.eventId = ev.id;
      } else if (wantEvent && t.eventId) {
        try {
          await gcal('PUT', '/calendars/primary/events/' + t.eventId, taskEventBody(t));
        } catch (e) {
          if (e.message === 'expired') throw e;
          // Event was deleted in Calendar — recreate it.
          const ev = await gcal('POST', '/calendars/primary/events', taskEventBody(t));
          t.eventId = ev.id;
        }
      } else if (!wantEvent && t.eventId) {
        try { await gcal('DELETE', '/calendars/primary/events/' + t.eventId); }
        catch (e) { if (e.message === 'expired') throw e; }
        t.eventId = null;
      }
    }

    await syncDailyEvent();
    localStorage.setItem('tm_tasks', JSON.stringify(tasks));
    setGcalStatus('Alerts on · synced ' + new Date().toLocaleTimeString(), 'on');
  } catch (e) {
    if (e.message !== 'expired') setGcalStatus('Sync error: ' + e.message, 'err');
    // Whatever event IDs we did get are saved so we don't duplicate next time.
    localStorage.setItem('tm_tasks', JSON.stringify(tasks));
  }
}

const DAILY_EVENT_KEY   = 'tm_daily_event_v2';   // JSON {id, date} for today's single-day event
const LEGACY_DAILY_KEY  = 'tm_daily_event';       // old infinitely-recurring event id, one-time cleanup

async function syncDailyEvent() {
  // One-time migration: the old scheme created a never-ending RRULE:FREQ=DAILY
  // event, which is what was flooding the calendar with an entry on every day
  // regardless of whether there was anything urgent. Delete it if we still have
  // its id on this device.
  const legacyId = localStorage.getItem(LEGACY_DAILY_KEY);
  if (legacyId) {
    try { await gcal('DELETE', '/calendars/primary/events/' + legacyId); }
    catch (e) { if (e.message === 'expired') throw e; }
    localStorage.removeItem(LEGACY_DAILY_KEY);
  }

  const q1 = tasks.filter(t => !t.done && !t.deleted && t.quad === 1);
  const today = todayStr();

  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(DAILY_EVENT_KEY) || 'null'); } catch (_) {}
  if (saved && saved.date !== today) saved = null;   // that event was for a past day; nothing to clean up, it doesn't recur

  if (!q1.length) {
    // Nothing urgent+important right now — don't create a nag event for today.
    if (saved && saved.id) {
      try { await gcal('DELETE', '/calendars/primary/events/' + saved.id); }
      catch (e) { if (e.message === 'expired') throw e; }
    }
    localStorage.removeItem(DAILY_EVENT_KEY);
    return;
  }

  const body = dailyEventBody(q1, today);
  if (saved && saved.id) {
    try {
      await gcal('PUT', '/calendars/primary/events/' + saved.id, body);
      return;
    } catch (e) {
      if (e.message === 'expired') throw e;
      // fall through and recreate
    }
  }
  const ev = await gcal('POST', '/calendars/primary/events', body);
  localStorage.setItem(DAILY_EVENT_KEY, JSON.stringify({ id: ev.id, date: today }));
}

// Reconcile calendar, then push the (event-id-stamped) task list to Drive.
async function syncAll() {
  await syncCalendar();
  if (!gcalConnected) return;        // syncCalendar may have hit 'expired'
  try {
    await saveToDrive();
    setGcalStatus('Synced · tasks + alerts ' + new Date().toLocaleTimeString(), 'on');
  } catch (e) {
    if (e.message !== 'expired') setGcalStatus('Drive sync error: ' + e.message, 'err');
  }
}

function scheduleSync() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncAll, 800);
}

// Runs once a token arrives: pull tasks from Drive, then reconcile + push back.
async function onConnected() {
  try {
    await loadFromDrive();
  } catch (e) {
    if (e.message !== 'expired') setGcalStatus('Drive load error: ' + e.message, 'err');
  }
  syncAll();
}

// When the tab regains focus, pull any changes made on another device. The
// modifiedTime check inside loadFromDrive() makes a no-op pull cheap.
function pullOnFocus() {
  if (gcalConnected) loadFromDrive().catch(e => {
    if (e.message !== 'expired') setGcalStatus('Drive load error: ' + e.message, 'err');
  });
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') pullOnFocus();
});
window.addEventListener('focus', pullOnFocus);

// ─── Voice ───────────────────────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, recActive = false;

if (SR) {
  rec = new SR();
  rec.continuous = false;
  rec.interimResults = false;
  rec.lang = 'en-US';
  rec.onstart  = () => { recActive = true;  voiceBtn.classList.add('on'); voiceBtn.textContent = '🛑'; };
  rec.onend    = () => { recActive = false; voiceBtn.classList.remove('on'); voiceBtn.textContent = '🎤'; };
  rec.onresult = e => { taskInput.value = Array.from(e.results).map(r => r[0].transcript).join(' ').trim(); };
  rec.onerror  = () => flash('Voice failed — type instead');
  voiceBtn.addEventListener('click', () => recActive ? rec.stop() : (taskInput.value = '', rec.start()));
} else {
  voiceBtn.style.display = 'none';
}

// ─── Add task flow ────────────────────────────────────────────────────────────
const dlTitle    = dlModal.querySelector('h3');
const dlConfirmB = document.getElementById('dlConfirm');
const dlSkipB    = document.getElementById('dlSkip');

function openAddFlow() {
  const text = taskInput.value.trim();
  if (!text) { taskInput.focus(); return; }
  dlMode = 'add'; dlEditId = null;
  pendingText = text;
  taskInput.value = '';
  dlInput.value = '';
  dlTitle.textContent    = 'Set a deadline? (optional)';
  dlConfirmB.textContent = 'Set deadline';
  dlSkipB.textContent    = 'Skip';
  dlModal.classList.add('show');
  setTimeout(() => dlInput.focus(), 60);
}

addBtn.addEventListener('click', openAddFlow);
taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') openAddFlow(); });

// Reuse the same modal to change (or clear) an existing task's deadline.
function openDeadlineEditor(id) {
  const t = find(id);
  if (!t) return;
  dlMode = 'edit'; dlEditId = id;
  dlInput.value          = t.deadline ? toLocalInput(t.deadline) : '';
  dlTitle.textContent    = 'Change deadline';
  dlConfirmB.textContent = 'Save';
  dlSkipB.textContent    = 'Clear deadline';
  dlModal.classList.add('show');
  setTimeout(() => dlInput.focus(), 60);
}

// Absolute ms → the local wall-clock value <input type=datetime-local> expects.
function toLocalInput(ms) {
  const d = new Date(ms - new Date(ms).getTimezoneOffset() * 60000);
  return d.toISOString().slice(0, 16);
}

dlConfirmB.addEventListener('click', () => {
  const dl = dlInput.value ? new Date(dlInput.value).getTime() : null;
  if (dlMode === 'edit') applyDeadline(dlEditId, dl);
  else                   commitAdd(pendingText, dl);
  closeDeadlineModal();
});

dlSkipB.addEventListener('click', () => {
  if (dlMode === 'edit') applyDeadline(dlEditId, null);  // button reads "Clear deadline"
  else                   commitAdd(pendingText, null);   // button reads "Skip"
  closeDeadlineModal();
});

function closeDeadlineModal() {
  dlModal.classList.remove('show');
  dlMode = 'add'; dlEditId = null;
}

// Change a task's deadline in place; persist() re-syncs its calendar event
// (creates / updates / removes it as needed on the next sync).
function applyDeadline(id, dl) {
  const t = find(id);
  if (!t) return;
  t.deadline = dl || null;
  t.updatedAt = Date.now();
  persist();
  render();
}

// ─── Note / comment editor ──────────────────────────────────────────────────────
// A task can carry several comments (t.notes is an array); this modal always adds
// a new one rather than overwriting a single note.
function openNoteEditor(id) {
  const t = find(id);
  if (!t) return;
  noteTaskId = id;
  noteInput.value = '';
  noteModal.classList.add('show');
  setTimeout(() => noteInput.focus(), 60);
}

document.getElementById('noteSave').addEventListener('click', () => {
  const t = find(noteTaskId);
  if (t) {
    const v = noteInput.value.trim();
    if (v) {
      if (!t.notes) t.notes = [];
      t.notes.push({ id: Date.now(), text: v, createdAt: Date.now() });
      t.updatedAt = Date.now();
      persist();
      render();
    }
  }
  noteModal.classList.remove('show');
  noteTaskId = null;
});

document.getElementById('noteCancel').addEventListener('click', () => {
  noteModal.classList.remove('show');
  noteTaskId = null;
});

function deleteNote(taskId, noteId) {
  const t = find(taskId);
  if (!t || !t.notes) return;
  t.notes = t.notes.filter(n => n.id !== noteId);
  t.updatedAt = Date.now();
  persist();
  render();
}

// ─── Per-task ⋮ menu ─────────────────────────────────────────────────────────────
function toggleTaskMenu(ev, id) {
  ev.stopPropagation();   // keep the document handler from closing it instantly
  const menu = document.querySelector(`.task-menu[data-menu="${id}"]`);
  const wasOpen = menu && menu.classList.contains('open');
  closeAllMenus();
  if (menu && !wasOpen) menu.classList.add('open');
}
function closeAllMenus() {
  document.querySelectorAll('.task-menu.open').forEach(m => m.classList.remove('open'));
}
document.addEventListener('click', closeAllMenus);

dlInput.addEventListener('focus', () => {
  if (!dlInput.value) {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    dlInput.value = d.toISOString().slice(0, 16);
  }
});

function commitAdd(text, deadline) {
  const q = classify(text, deadline);
  tasks.push({ id: Date.now(), text, quad: q, done: false, deadline: deadline || null, eventId: null, updatedAt: Date.now() });
  persist();
  render();
  const names = ['Urgent + Important', 'Urgent', 'Important', 'Neither'];
  flash(`Added to "${names[q - 1]}"`, 2200);
}

// ─── Edit ─────────────────────────────────────────────────────────────────────
function startEdit(id) {
  editingId = id;
  render();
  const el = document.querySelector(`[data-edit="${id}"]`);
  if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
}

function commitEdit(id) {
  const el  = document.querySelector(`[data-edit="${id}"]`);
  const txt = el?.value.trim();
  if (txt) {
    const t = find(id);
    if (t) { t.text = txt; t.updatedAt = Date.now(); }
    persist();
  }
  editingId = null;
  render();
}

function cancelEdit() { editingId = null; render(); }

// ─── Task actions ─────────────────────────────────────────────────────────────
// Soft-delete: keep a tombstone so the deletion syncs to other devices (and the
// calendar event gets removed on the next sync). Filtered out at render time.
function deleteTask(id) { const t = find(id); if (t) { t.deleted = true; t.updatedAt = Date.now(); persist(); render(); } }
function toggleDone(id) {
  const t = find(id);
  if (t) {
    t.done = !t.done;
    t.completedAt = t.done ? Date.now() : null;   // stamp completion for the activity log
    t.updatedAt = Date.now();
    persist();
    render();
  }
}
function reopenTask(id) { toggleDone(id); }   // log "↩ reopen" puts a task back on the board
function moveTask(id, q) { const t = find(id); if (t && t.quad !== q) { t.quad = q; t.updatedAt = Date.now(); persist(); render(); } }

function find(id) { return tasks.find(t => t.id === id); }

// ─── Persistence ───────────────────────────────────────────────────────────────
// Save locally (instant), then reconcile Google Calendar if connected.
function persist() {
  localStorage.setItem('tm_tasks', JSON.stringify(tasks));
  if (gcalConnected) scheduleSync();
}

// ─── Notes & Ideas (free-form, not tasks) ───────────────────────────────────────
// A separate, lightweight scratchpad for thoughts related to your tasks that
// don't belong in a task's comments or deserve a quadrant of their own.
const IDEAS_KEY = 'tm_ideas';
let ideas = JSON.parse(localStorage.getItem(IDEAS_KEY) || '[]');

function saveIdeas() { localStorage.setItem(IDEAS_KEY, JSON.stringify(ideas)); }

function renderIdeas() {
  document.getElementById('ideaCount').textContent = ideas.length;
  const wrap = document.getElementById('ideaList');
  if (!ideas.length) { wrap.innerHTML = '<div class="empty-msg">No notes yet.</div>'; return; }
  wrap.innerHTML = ideas.slice().sort((a, b) => b.createdAt - a.createdAt).map(n => `
    <div class="idea-item">
      <div class="idea-text">${esc(n.text)}</div>
      <div class="idea-bottom">
        <span class="idea-when">${new Date(n.createdAt).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</span>
        <button class="idea-del" onclick="deleteIdea(${n.id})" title="Delete">✕</button>
      </div>
    </div>`).join('');
}

function deleteIdea(id) {
  ideas = ideas.filter(n => n.id !== id);
  saveIdeas();
  renderIdeas();
}

document.getElementById('ideaAdd').addEventListener('click', () => {
  const input = document.getElementById('ideaInput');
  const v = input.value.trim();
  if (!v) return;
  ideas.push({ id: Date.now(), text: v, createdAt: Date.now() });
  saveIdeas();
  input.value = '';
  renderIdeas();
});

// ─── Classification ───────────────────────────────────────────────────────────
function classify(text, deadline) {
  const t = text.toLowerCase();
  const urgent = /urgent|asap|today|deadline|rush|critical|emergency|now|immediately/i.test(t);
  const imp    = /important|goal|project|strategy|health|family|career|learning|growth|key/i.test(t);

  if (deadline) {
    const h = (deadline - Date.now()) / 3600000;
    if (h < 24) return imp ? 1 : 2;
    if (h < 72) return 1;
  }

  if (urgent && imp) return 1;
  if (urgent)        return 2;
  if (imp)           return 3;
  return 4;
}

function deadlineBadge(t) {
  if (!t.deadline) return '';
  const ms = t.deadline - Date.now();
  let text, cls;
  if (ms < 0) {
    text = 'Overdue'; cls = 'overdue';
  } else {
    const h = ms / 3600000;
    if (h < 1)        { text = Math.round(ms / 60000) + 'm left'; cls = 'overdue'; }
    else if (h < 24)  { text = Math.round(h) + 'h left'; cls = 'overdue'; }
    else { const d = Math.round(h / 24); text = d + 'd left'; cls = d < 3 ? 'soon' : 'later'; }
  }
  // Small badge showing a calendar alarm is set for this task.
  const alarm = (!t.done && t.eventId) ? '<span class="task-badge alarm">⏰ alert set</span>' : '';
  return `<span class="task-badge ${cls}">${text}</span>${alarm}`;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  for (let q = 1; q <= 4; q++) {
    // Done tasks leave the board entirely — they live in the Activity log below.
    const list = tasks.filter(t => t.quad === q && !t.deleted && !t.done);
    const el   = document.getElementById('q' + q);
    document.getElementById('cnt' + q).textContent = list.length;

    if (!list.length) {
      el.innerHTML = '<div class="empty-msg">—</div>';
    } else {
      el.innerHTML = list.map(taskCard).join('');

      el.querySelectorAll('.task[draggable]').forEach(node => {
        node.addEventListener('dragstart', onDragStart);
        node.addEventListener('dragend',   onDragEnd);
      });

      el.querySelectorAll('.task[data-id]').forEach(node => {
        node.addEventListener('touchstart', onTouchStart, { passive: true });
      });

      el.querySelectorAll('[data-edit]').forEach(node => {
        node.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commitEdit(editingId); }
          if (e.key === 'Escape') cancelEdit();
        });
      });
    }
  }
  renderLog();
  updateStatus();
}

// ─── Completed-task activity log ────────────────────────────────────────────────
// Lists every finished task below the matrix, with timing: how long after it was
// added it got done, and (if it had a deadline) whether it was on time or late.
function fmtDuration(ms) {
  if (ms < 0) ms = 0;
  const min = Math.round(ms / 60000);
  if (min < 1)   return 'under a minute';
  if (min < 60)  return min + ' min';
  const h = Math.floor(min / 60), m = min % 60;
  if (h < 24)    return h + 'h' + (m ? ' ' + m + 'm' : '');
  const d = Math.floor(h / 24), hh = h % 24;
  return d + 'd' + (hh ? ' ' + hh + 'h' : '');
}

function renderLog() {
  const done = tasks
    .filter(t => t.done && !t.deleted)
    .sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

  document.getElementById('logCount').textContent = done.length;
  const wrap = document.getElementById('logList');

  if (!done.length) {
    wrap.innerHTML = '<div class="empty-msg">No completed tasks yet.</div>';
    return;
  }

  wrap.innerHTML = done.map(t => {
    const when = t.completedAt
      ? new Date(t.completedAt).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
      : '';

    let badge = '<span class="log-badge done">Completed</span>';
    const parts = [];

    if (t.deadline && t.completedAt) {
      const diff = t.completedAt - t.deadline;   // +ve = finished after deadline
      if (diff > 60000) {
        badge = '<span class="log-badge late">Delayed</span>';
        parts.push('Finished <b>' + fmtDuration(diff) + '</b> after the deadline.');
      } else {
        badge = '<span class="log-badge ontime">On time</span>';
        parts.push('Finished ' + fmtDuration(-diff) + ' before the deadline.');
      }
    }
    if (t.completedAt && t.id) {
      parts.push('Took ' + fmtDuration(t.completedAt - t.id) + ' from when it was added.');
    }

    return `
      <div class="log-item">
        <div class="log-top">${badge}<span class="log-when">${when}</span></div>
        <div class="log-text">${esc(t.text)}</div>
        ${taskNotesHtml(t)}
        ${parts.length ? `<div class="log-detail">${parts.join(' ')}</div>` : ''}
        <button class="log-reopen" onclick="reopenTask(${t.id})">↩ reopen</button>
      </div>`;
  }).join('');
}

// Activity log is collapsed by default — only the title + count badge show;
// the list itself is opt-in via the toggle, and the choice is remembered.
const LOG_COLLAPSED_KEY = 'tm_log_collapsed';
let logCollapsed = localStorage.getItem(LOG_COLLAPSED_KEY) !== '0';

function applyLogCollapsed() {
  document.getElementById('logList').classList.toggle('collapsed', logCollapsed);
  document.getElementById('logToggleBtn').textContent = logCollapsed ? 'Show' : 'Hide';
}

function toggleLogCollapsed() {
  logCollapsed = !logCollapsed;
  localStorage.setItem(LOG_COLLAPSED_KEY, logCollapsed ? '1' : '0');
  applyLogCollapsed();
}

document.getElementById('logToggle').addEventListener('click', toggleLogCollapsed);
document.getElementById('logToggleBtn').addEventListener('click', toggleLogCollapsed);

// "Clear completed" — soft-delete every done task (tombstones, so the clear syncs
// to other devices and the calendar events get cleaned up on the next sync).
document.getElementById('logClear').addEventListener('click', () => {
  const done = tasks.filter(t => t.done && !t.deleted);
  if (!done.length) return;
  if (!confirm('Clear ' + done.length + ' completed task(s) from the log?')) return;
  const now = Date.now();
  done.forEach(t => { t.deleted = true; t.updatedAt = now; });
  persist();
  render();
});

function taskCard(t) {
  if (editingId === t.id) {
    return `
      <div class="task" data-id="${t.id}">
        <textarea class="task-edit" data-edit="${t.id}" rows="2">${esc(t.text)}</textarea>
        <div class="task-actions">
          <button class="task-btn green" onclick="commitEdit(${t.id})">Save</button>
          <button class="task-btn" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>`;
  }

  return `
    <div class="task" draggable="true" data-id="${t.id}">
      <span class="task-handle" title="Hold to drag">⠿⠿</span>
      <div class="task-text">${esc(t.text)}</div>
      ${taskNotesHtml(t)}
      ${deadlineBadge(t)}
      <div class="task-actions">
        <button class="task-btn green" onclick="toggleDone(${t.id})" title="Mark done">✓</button>
        <button class="task-btn dots" onclick="toggleTaskMenu(event, ${t.id})" title="More">⋮</button>
        <button class="task-btn red" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>
      <div class="task-menu" data-menu="${t.id}">
        <button onclick="startEdit(${t.id})">✏️ Edit text</button>
        <button onclick="openNoteEditor(${t.id})">💬 ${t.notes && t.notes.length ? 'Add another comment' : 'Add comment'}</button>
        <button onclick="openDeadlineEditor(${t.id})">⏰ ${t.deadline ? 'Change deadline' : 'Set deadline'}</button>
      </div>
    </div>`;
}

function taskNotesHtml(t) {
  if (!t.notes || !t.notes.length) return '';
  return `<div class="task-notes">${t.notes.map(n => `
    <div class="task-note">
      <span class="note-text">${esc(n.text)}</span>
      <button class="note-del" onclick="deleteNote(${t.id}, ${n.id})" title="Delete comment">✕</button>
    </div>`).join('')}</div>`;
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── Mouse drag ─────────────────────────────────────────────────────────────
function onDragStart(e) {
  dragId = this.dataset.id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => this.classList.add('dragging'), 0);
}

function onDragEnd() {
  this.classList.remove('dragging');
  clearHighlight();
}

document.querySelectorAll('.task-list').forEach(zone => {
  zone.addEventListener('dragover', e => {
    e.preventDefault();
    zone.closest('.quadrant').classList.add('drag-over');
  });
  zone.addEventListener('dragleave', e => {
    if (!zone.closest('.quadrant').contains(e.relatedTarget)) {
      zone.closest('.quadrant').classList.remove('drag-over');
    }
  });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    clearHighlight();
    if (dragId) { moveTask(parseInt(dragId), parseInt(zone.dataset.quad)); dragId = null; }
  });
});

function clearHighlight() {
  document.querySelectorAll('.quadrant').forEach(q => q.classList.remove('drag-over'));
}

// ─── Touch drag ───────────────────────────────────────────────────────────────
function onTouchStart(e) {
  if (e.target.closest('button, textarea')) return;
  const taskEl = this;
  const touch  = e.touches[0];
  touchOriginX = touch.clientX;
  touchOriginY = touch.clientY;

  touchTimer = setTimeout(() => {
    dragId = taskEl.dataset.id;
    taskEl.classList.add('dragging');

    ghost = document.createElement('div');
    ghost.className = 'drag-ghost';
    ghost.textContent = taskEl.querySelector('.task-text')?.textContent || '';
    document.body.appendChild(ghost);
    placeGhost(touchOriginX, touchOriginY);
  }, 300);
}

document.addEventListener('touchmove', e => {
  if (touchTimer) {
    const t = e.touches[0];
    if (Math.abs(t.clientX - touchOriginX) > 8 || Math.abs(t.clientY - touchOriginY) > 8) {
      clearTimeout(touchTimer);
      touchTimer = null;
    }
  }

  if (!ghost || !dragId) return;
  e.preventDefault();

  const { clientX, clientY } = e.touches[0];
  placeGhost(clientX, clientY);

  ghost.style.visibility = 'hidden';
  const hit = document.elementFromPoint(clientX, clientY);
  ghost.style.visibility = '';

  clearHighlight();
  const quad = hit?.closest('.quadrant');
  if (quad) { quad.classList.add('drag-over'); dropQuad = quad; }
  else dropQuad = null;

}, { passive: false });

document.addEventListener('touchend', () => {
  clearTimeout(touchTimer); touchTimer = null;

  if (ghost) { ghost.remove(); ghost = null; }
  document.querySelectorAll('.task').forEach(t => t.classList.remove('dragging'));
  clearHighlight();

  if (dragId && dropQuad) {
    const zone = dropQuad.querySelector('.task-list');
    if (zone) moveTask(parseInt(dragId), parseInt(zone.dataset.quad));
  }

  dragId = null; dropQuad = null;
});

function placeGhost(x, y) {
  if (!ghost) return;
  ghost.style.left = x + 'px';
  ghost.style.top  = (y - 60) + 'px';
}

// ─── Status helpers ───────────────────────────────────────────────────────────
let flashTimer = null;

function flash(msg, ms = 2000) {
  statusEl.textContent = msg;
  clearTimeout(flashTimer);
  flashTimer = setTimeout(updateStatus, ms);
}

function updateStatus() {
  const n = tasks.filter(t => !t.done && !t.deleted).length;
  statusEl.textContent = n ? `${n} active task${n === 1 ? '' : 's'}` : 'All clear ✓';
}

// ─── Fast Reading (RSVP) ────────────────────────────────────────────────────────
// Rapid Serial Visual Presentation: words are flashed one at a time at a fixed
// point so the eyes don't have to move (no saccades). Each word is split at its
// Optimal Recognition Point (ORP) — the focal letter, shown in red — which is the
// spot the eye naturally lands on. The "custom database" is a small library of
// saved passages kept in localStorage on this device.

const RSVP_LIB_KEY = 'tm_reading_lib';
const RSVP_WPM_KEY = 'tm_reading_wpm';

let rsvpLib     = [];
let rsvpCurId   = null;       // id of the passage being edited/read
let rsvpWords   = [];
let rsvpIdx     = 0;
let rsvpTimer   = null;
let rsvpPlaying = false;
let rsvpWpm     = parseInt(localStorage.getItem(RSVP_WPM_KEY) || '300', 10);

// UI refs
const readModal   = document.getElementById('readModal');
const readLib     = document.getElementById('readLib');
const readTitle   = document.getElementById('readTitle');
const readContent = document.getElementById('readContent');
const rsvpWordEl  = document.getElementById('rsvpWord');
const rsvpBar     = document.getElementById('rsvpBar');
const rsvpPos     = document.getElementById('rsvpPos');
const rsvpEta     = document.getElementById('rsvpEta');
const rsvpWpmEl   = document.getElementById('rsvpWpm');
const rsvpWpmLbl  = document.getElementById('rsvpWpmLabel');
const rsvpPlayBtn = document.getElementById('rsvpPlay');
const rsvpSeekEl  = document.getElementById('rsvpSeek');

function loadRsvpLib() {
  try { rsvpLib = JSON.parse(localStorage.getItem(RSVP_LIB_KEY) || '[]'); }
  catch (_) { rsvpLib = []; }
  if (!Array.isArray(rsvpLib)) rsvpLib = [];
  // Seed a friendly sample the very first time.
  if (!rsvpLib.length) {
    rsvpLib = [{
      id: Date.now(),
      title: 'Sample — how this works',
      text: 'Welcome to fast reading. Words appear one at a time in the same spot, so your eyes stay still instead of jumping across the line. The single red letter in each word marks the point your eye naturally focuses on. Start around three hundred words per minute, then nudge the speed up as it begins to feel easy. Reading this way takes a little practice, but it can roughly double your pace with good comprehension.'
    }];
    saveRsvpLib();
  }
}

function saveRsvpLib() { localStorage.setItem(RSVP_LIB_KEY, JSON.stringify(rsvpLib)); }

function refreshLibDropdown() {
  readLib.innerHTML = rsvpLib
    .map(p => `<option value="${p.id}">${esc(p.title || 'Untitled')}</option>`)
    .join('');
  if (rsvpCurId != null) readLib.value = String(rsvpCurId);
}

function selectPassage(id) {
  const p = rsvpLib.find(x => String(x.id) === String(id));
  if (!p) return;
  saveReadingPosition();   // persist progress on whichever passage we're leaving, if any
  rsvpCurId = p.id;
  readTitle.value = p.title || '';
  readContent.value = p.text || '';
  refreshLibDropdown();
  // Resume from wherever this passage was left off, instead of always restarting
  // at word 0 — that's the whole point of remembering a position per passage.
  rsvpIdx = p.lastIdx || 0;
  prepareWords(false);
}

// Split text into display tokens (words keep their trailing punctuation).
// resetIdx=false keeps the current rsvpIdx (used when resuming a saved passage);
// resetIdx=true (the default, e.g. when the text itself was just edited) restarts at 0.
function prepareWords(resetIdx) {
  rsvpStop();
  rsvpWords = (readContent.value || '').trim().split(/\s+/).filter(Boolean);
  if (resetIdx !== false || rsvpIdx > rsvpWords.length) rsvpIdx = 0;
  renderRsvpIdle();
  updateRsvpMeta();
}

function renderRsvpIdle() {
  if (!rsvpWords.length) {
    rsvpWordEl.innerHTML = '<span class="rsvp-idle">Add some text above</span>';
  } else if (rsvpIdx > 0 && rsvpIdx < rsvpWords.length) {
    showRsvpWord(rsvpWords[rsvpIdx]);   // show where we'll resume from, statically
  } else {
    rsvpWordEl.innerHTML = '<span class="rsvp-idle">Press play to begin</span>';
  }
}

// Remember this passage's reading position so reopening it (or reloading the
// page) resumes here instead of forcing a restart from the beginning.
function saveReadingPosition() {
  if (rsvpCurId == null) return;
  const p = rsvpLib.find(x => String(x.id) === String(rsvpCurId));
  if (!p) return;
  p.lastIdx = rsvpIdx;
  saveRsvpLib();
}

// ORP: focal letter index grows with word length (~30% in). Matches the standard
// table for 4 / 6 / 8 / 10–13-character words.
function orpIndex(word) {
  const n = word.length;
  if (n <= 1)  return 0;
  if (n <= 5)  return 1;
  if (n <= 9)  return 2;
  if (n <= 13) return 3;
  return 4;
}

function showRsvpWord(word) {
  const i = orpIndex(word);
  const left  = word.slice(0, i);
  const pivot = word.slice(i, i + 1);
  const right = word.slice(i + 1);
  rsvpWordEl.innerHTML =
    `<span class="l">${esc(left)}</span>` +
    `<span class="p">${esc(pivot)}</span>` +
    `<span class="r">${esc(right)}</span>`;
}

function updateRsvpMeta() {
  const total = rsvpWords.length;
  rsvpPos.textContent = `${Math.min(rsvpIdx, total)} / ${total} words`;
  rsvpBar.style.width = total ? (Math.min(rsvpIdx, total) / total * 100) + '%' : '0%';
  const remaining = Math.max(total - rsvpIdx, 0);
  const secs = Math.round(remaining / rsvpWpm * 60);
  rsvpEta.textContent = remaining ? `~${Math.floor(secs / 60)}m ${secs % 60}s left` : '';
  rsvpSeekEl.max = Math.max(total - 1, 0);
  rsvpSeekEl.value = Math.min(rsvpIdx, total ? total - 1 : 0);
}

function rsvpTick() {
  if (rsvpIdx >= rsvpWords.length) {
    rsvpIdx = 0;   // finished — next time this passage is opened, start over
    rsvpStop();
    renderRsvpIdle();
    updateRsvpMeta();
    return;
  }
  const word = rsvpWords[rsvpIdx];
  showRsvpWord(word);
  rsvpIdx++;
  updateRsvpMeta();

  // Pace: base interval per word, with natural pauses on punctuation and a small
  // bump for long words — this keeps comprehension up at speed.
  let delay = 60000 / rsvpWpm;
  if (/[,;:)\]\u2013\u2014]$/.test(word)) delay *= 1.6;
  if (/[.!?\u2026]$/.test(word))          delay *= 2.3;
  if (word.length > 8)                    delay *= 1.15;

  rsvpTimer = setTimeout(rsvpTick, delay);
}

function rsvpPlay() {
  if (!rsvpWords.length) return;
  if (rsvpIdx >= rsvpWords.length) rsvpIdx = 0;
  rsvpPlaying = true;
  rsvpPlayBtn.textContent = '⏸ Pause';
  rsvpTick();
}

function rsvpStop() {
  rsvpPlaying = false;
  clearTimeout(rsvpTimer);
  rsvpTimer = null;
  rsvpPlayBtn.textContent = '▶ Play';
  saveReadingPosition();
}

function rsvpToggle() { rsvpPlaying ? rsvpStop() : rsvpPlay(); }

// Controls
rsvpPlayBtn.addEventListener('click', rsvpToggle);
document.getElementById('rsvpReset').addEventListener('click', () => {
  rsvpStop(); rsvpIdx = 0; renderRsvpIdle(); updateRsvpMeta();
});
document.getElementById('rsvpPrev').addEventListener('click', () => {
  const wasPlaying = rsvpPlaying; rsvpStop();
  rsvpIdx = Math.max(0, rsvpIdx - 10);
  if (rsvpWords[rsvpIdx]) showRsvpWord(rsvpWords[rsvpIdx]);
  updateRsvpMeta();
  if (wasPlaying) rsvpPlay();
});
document.getElementById('rsvpNext').addEventListener('click', () => {
  const wasPlaying = rsvpPlaying; rsvpStop();
  rsvpIdx = Math.min(rsvpWords.length, rsvpIdx + 10);
  if (rsvpWords[rsvpIdx]) showRsvpWord(rsvpWords[rsvpIdx]);
  updateRsvpMeta();
  if (wasPlaying) rsvpPlay();
});

// Seek slider — jump straight to any word in the passage instead of only being
// able to restart from the beginning or step 10 words at a time.
rsvpSeekEl.addEventListener('input', () => {
  const wasPlaying = rsvpPlaying; rsvpStop();
  rsvpIdx = Math.min(parseInt(rsvpSeekEl.value, 10) || 0, Math.max(rsvpWords.length - 1, 0));
  if (rsvpWords[rsvpIdx]) showRsvpWord(rsvpWords[rsvpIdx]);
  updateRsvpMeta();
  saveReadingPosition();
  if (wasPlaying) rsvpPlay();
});

// Speed
function setWpm(v) {
  rsvpWpm = parseInt(v, 10);
  rsvpWpmEl.value = rsvpWpm;
  rsvpWpmLbl.textContent = rsvpWpm + ' WPM';
  localStorage.setItem(RSVP_WPM_KEY, String(rsvpWpm));
  document.querySelectorAll('#rsvpPresets button').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.wpm, 10) === rsvpWpm));
  updateRsvpMeta();
}
rsvpWpmEl.addEventListener('input', e => setWpm(e.target.value));
document.querySelectorAll('#rsvpPresets button').forEach(b =>
  b.addEventListener('click', () => setWpm(b.dataset.wpm)));

// Library editing
readLib.addEventListener('change', e => selectPassage(e.target.value));

document.getElementById('readNew').addEventListener('click', () => {
  const p = { id: Date.now(), title: 'New passage', text: '' };
  rsvpLib.unshift(p);
  saveRsvpLib();
  refreshLibDropdown();
  selectPassage(p.id);   // saves the outgoing passage's position, then switches
  readTitle.focus();
});

document.getElementById('readSave').addEventListener('click', () => {
  const p = rsvpLib.find(x => String(x.id) === String(rsvpCurId));
  if (!p) return;
  p.title = readTitle.value.trim() || 'Untitled';
  p.text  = readContent.value;
  saveRsvpLib();
  refreshLibDropdown();
  prepareWords();
  flash('Passage saved');
});

document.getElementById('readDelete').addEventListener('click', () => {
  if (rsvpCurId == null) return;
  if (!confirm('Delete this passage?')) return;
  rsvpLib = rsvpLib.filter(x => String(x.id) !== String(rsvpCurId));
  saveRsvpLib();
  const nextId = rsvpLib[0] ? rsvpLib[0].id : null;
  if (nextId != null) {
    selectPassage(nextId);   // deleted passage is already gone from rsvpLib, so nothing stale gets saved
  } else {
    rsvpCurId = null;
    refreshLibDropdown();
    readTitle.value = ''; readContent.value = ''; prepareWords();
  }
});

// Re-tokenize as the user types, so play always reflects the latest text.
// Editing the text invalidates any remembered position, so this always resets.
readContent.addEventListener('input', () => prepareWords(true));

// Open / close modal
function openReader() {
  loadRsvpLib();
  refreshLibDropdown();
  const idToOpen = rsvpCurId != null ? rsvpCurId : (rsvpLib[0] && rsvpLib[0].id);
  if (idToOpen != null) selectPassage(idToOpen);
  setWpm(rsvpWpm);
  readModal.classList.add('show');
}
function closeReader() { rsvpStop(); readModal.classList.remove('show'); }

document.getElementById('readLaunch').addEventListener('click', openReader);
document.getElementById('readClose').addEventListener('click', closeReader);
readModal.addEventListener('click', e => { if (e.target === readModal) closeReader(); });

// Spacebar toggles play/pause while the reader is open (unless typing in a field).
document.addEventListener('keydown', e => {
  if (!readModal.classList.contains('show')) return;
  if (e.code === 'Space' && !/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName)) {
    e.preventDefault(); rsvpToggle();
  }
  if (e.key === 'Escape') closeReader();
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
applyLogCollapsed();
renderIdeas();
render();
taskInput.focus();
</script>

<!-- Google Identity Services. initGis() runs once this loads. -->
<script src="https://accounts.google.com/gsi/client" onload="initGis()" async defer></script>

</body>
